name: Deploy production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type deploy-production to confirm
        required: true
        type: string
      migration_mode:
        description: Database migration mode
        required: true
        default: none
        type: choice
        options:
          - none
          - backward_compatible
          - maintenance_required

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production
    if: ${{ inputs.confirmation == 'deploy-production' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_PHP_BINARY: ${{ secrets.DEPLOY_PHP_BINARY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build release artifact
        run: |
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
          npm ci
          npm run build
          tar \
            --exclude-vcs \
            --exclude=.env \
            --exclude=.env.local \
            --exclude=.env.production.local \
            --exclude=.env.staging.local \
            --exclude=storage \
            --exclude=node_modules \
            --exclude=deploy_temp.zip \
            --exclude='deploy_temp.zip.*' \
            --exclude=backups \
            --exclude=outputs \
            --exclude=public/hot \
            -czf "$RUNNER_TEMP/release.tar.gz" .

      - name: Configure SSH
        run: |
          test -n "$SSH_HOST" && test -n "$SSH_PORT" && test -n "$SSH_USER" && test -n "$DEPLOY_ROOT"
          install -d -m 700 ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" true

      - name: Upload and switch release
        run: |
          release="release-${GITHUB_SHA}.tar.gz"
          remote="$SSH_USER@$SSH_HOST"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$remote" "mkdir -p '$DEPLOY_ROOT/deploy-incoming'"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$RUNNER_TEMP/release.tar.gz" "$remote:$DEPLOY_ROOT/deploy-incoming/$release"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes scripts/deploy/remote-release.sh "$remote:$DEPLOY_ROOT/deploy-incoming/remote-release.sh"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$remote" "chmod 700 '$DEPLOY_ROOT/deploy-incoming/remote-release.sh' && DEPLOY_ROOT='$DEPLOY_ROOT' DEPLOY_TARGET=production DEPLOY_ARCHIVE='$DEPLOY_ROOT/deploy-incoming/$release' DEPLOY_MIGRATION_MODE='${{ inputs.migration_mode }}' DEPLOY_PHP_BINARY='$DEPLOY_PHP_BINARY' bash '$DEPLOY_ROOT/deploy-incoming/remote-release.sh'"
