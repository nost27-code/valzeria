name: Reset staging database

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type reset-staging-database to erase only the staging database
        required: true
        type: string

permissions:
  contents: read

jobs:
  reset:
    name: Reset staging database
    if: inputs.confirmation == 'reset-staging-database'
    runs-on: ubuntu-latest
    environment: staging
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_PHP_BINARY: ${{ secrets.DEPLOY_PHP_BINARY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          test -n "$SSH_HOST" && test -n "$SSH_PORT" && test -n "$SSH_USER" && test -n "$DEPLOY_ROOT"
          install -d -m 700 ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Reset only the staging database
        run: |
          remote="$SSH_USER@$SSH_HOST"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" scripts/deploy/reset-staging-database.sh "$remote:$DEPLOY_ROOT/deploy-incoming/reset-staging-database.sh"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$remote" "chmod 700 '$DEPLOY_ROOT/deploy-incoming/reset-staging-database.sh' && DEPLOY_ROOT='$DEPLOY_ROOT' DEPLOY_PHP_BINARY='$DEPLOY_PHP_BINARY' bash '$DEPLOY_ROOT/deploy-incoming/reset-staging-database.sh'"
