name: Reset staging database

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type reset-staging-database to erase only the staging database
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  reset:
    name: Reset staging database from trusted runner
    if: inputs.confirmation == 'reset-staging-database'
    runs-on: [self-hosted, Windows, X64]
    environment: staging
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_PHP_BINARY: ${{ secrets.DEPLOY_PHP_BINARY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Reset only the staging database
        shell: pwsh
        run: |
          & .\scripts\deploy\invoke-staging-database-reset.ps1
