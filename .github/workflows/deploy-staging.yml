name: Deploy staging

on:
  workflow_dispatch:
    inputs:
      migration_mode:
        description: Database migration mode
        required: true
        default: backward_compatible
        type: choice
        options:
          - none
          - backward_compatible
          - maintenance_required

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build:
    name: Build staging release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build release artifact
        run: |
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
          npm ci
          npm run build
          tar \
            --exclude-vcs \
            --exclude=.env \
            --exclude=.env.local \
            --exclude=.env.production.local \
            --exclude=.env.staging.local \
            --exclude=storage \
            --exclude=node_modules \
            --exclude=deploy_temp.zip \
            --exclude='deploy_temp.zip.*' \
            --exclude=backups \
            --exclude=outputs \
            --exclude=public/hot \
            -czf "$RUNNER_TEMP/release.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: staging-release-${{ github.sha }}
          path: ${{ runner.temp }}/release.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy staging from trusted runner
    needs: build
    runs-on: [self-hosted, Windows, X64]
    environment: staging
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_PHP_BINARY: /usr/bin/php8.4
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: staging-release-${{ github.sha }}
          path: ${{ runner.temp }}\valzeria-release

      - name: Verify and switch staging release
        shell: pwsh
        run: |
          & .\scripts\deploy\invoke-remote-release.ps1 `
            -Target staging `
            -MigrationMode '${{ inputs.migration_mode }}' `
            -ArchivePath '${{ runner.temp }}\valzeria-release\release.tar.gz'
