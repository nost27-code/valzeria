<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ヴァルモン地下探索 試作</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #172033;
            --muted: #667085;
            --line: #d9e2e7;
            --paper: #f7faf9;
            --panel: #ffffff;
            --moss: #2f8f68;
            --amber: #b7791f;
            --cave: #203045;
            --water: #256d85;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 8%, rgba(47, 143, 104, 0.16), transparent 28rem),
                linear-gradient(180deg, #e7f1ed 0%, #f8faf8 42%, #edf2f0 100%);
            color: var(--ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        button,
        select {
            font: inherit;
        }

        .app {
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: 16px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .title {
            min-width: 0;
        }

        .title p {
            margin: 0 0 3px;
            color: var(--moss);
            font-size: 12px;
            font-weight: 900;
        }

        h1 {
            margin: 0;
            font-size: clamp(22px, 5vw, 34px);
            line-height: 1.08;
        }

        .deploy-note {
            flex: 0 0 auto;
            border: 1px solid #b7d9c8;
            border-radius: 8px;
            background: #effaf3;
            color: #1f6f4f;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 800;
        }

        .screen {
            display: grid;
            grid-template-columns: minmax(0, 1.3fr) minmax(300px, 0.7fr);
            gap: 14px;
        }

        .stage,
        .side,
        .card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 10px 28px rgba(23, 32, 51, 0.08);
        }

        .stage {
            overflow: hidden;
        }

        .cave {
            position: relative;
            min-height: 480px;
            background:
                linear-gradient(180deg, rgba(20, 30, 45, 0.05), rgba(20, 30, 45, 0.36)),
                url("../../public/images/valmon/ranch_bg (18).webp") center / cover;
        }

        .cave::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 34%),
                radial-gradient(circle at 50% 68%, rgba(255, 219, 141, 0.34), transparent 16rem),
                radial-gradient(circle at 50% 88%, rgba(24, 42, 59, 0.62), transparent 28rem);
            pointer-events: none;
        }

        .route {
            position: absolute;
            inset: auto 8% 10% 8%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            align-items: end;
            gap: 8px;
            z-index: 2;
        }

        .node {
            min-height: 74px;
            border: 1px solid rgba(255, 255, 255, 0.52);
            border-radius: 8px;
            background: rgba(19, 35, 49, 0.62);
            color: white;
            padding: 10px;
            backdrop-filter: blur(6px);
        }

        .node.active {
            border-color: #ffe0a3;
            background: rgba(77, 64, 37, 0.78);
            box-shadow: 0 0 0 3px rgba(255, 222, 166, 0.22);
        }

        .node.done {
            background: rgba(35, 88, 69, 0.68);
        }

        .node strong,
        .node span {
            display: block;
        }

        .node strong {
            font-size: 12px;
        }

        .node span {
            margin-top: 4px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.78);
        }

        .partner {
            position: absolute;
            left: 9%;
            bottom: 22%;
            z-index: 4;
            display: flex;
            align-items: end;
            gap: 10px;
        }

        .partner img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            filter: drop-shadow(0 12px 12px rgba(0, 0, 0, 0.38));
        }

        .speech {
            max-width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.58);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.55;
        }

        .hud {
            position: relative;
            z-index: 3;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
        }

        .meter {
            border: 1px solid rgba(255, 255, 255, 0.42);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            padding: 9px;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
        }

        .bar {
            height: 9px;
            margin-top: 7px;
            overflow: hidden;
            border-radius: 999px;
            background: #dfe7ea;
        }

        .fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: var(--moss);
            transition: width 160ms ease;
        }

        .fill.energy {
            background: var(--water);
        }

        .fill.danger {
            background: var(--danger);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 12px;
            background: var(--panel);
            border-top: 1px solid var(--line);
        }

        .btn {
            min-height: 44px;
            border: 1px solid #b9c7ce;
            border-radius: 8px;
            background: #fff;
            color: var(--ink);
            font-weight: 900;
            cursor: pointer;
        }

        .btn.primary {
            border-color: #2c7b5c;
            background: var(--moss);
            color: white;
        }

        .btn.warn {
            border-color: #d6a85e;
            background: #fff8e6;
            color: #80530c;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .side {
            padding: 12px;
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .panel-title h2 {
            margin: 0;
            font-size: 16px;
        }

        .select {
            width: 100%;
            min-height: 40px;
            border: 1px solid #c7d2d8;
            border-radius: 8px;
            background: white;
            padding: 0 10px;
            font-weight: 800;
        }

        .valmons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0 12px;
        }

        .valmon-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfdfc;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }

        .valmon-card.active {
            border-color: var(--moss);
            box-shadow: 0 0 0 3px rgba(47, 143, 104, 0.16);
        }

        .valmon-card img {
            width: 54px;
            height: 54px;
            object-fit: contain;
        }

        .valmon-card strong {
            display: block;
            font-size: 12px;
        }

        .valmon-card span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        .loot-grid {
            display: grid;
            gap: 8px;
        }

        .loot {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfdfc;
            padding: 9px 10px;
            font-size: 13px;
            font-weight: 800;
        }

        .log {
            display: grid;
            gap: 7px;
            max-height: 260px;
            overflow: auto;
            padding-right: 2px;
        }

        .log p {
            margin: 0;
            border-left: 3px solid #b8c8cd;
            background: #f8faf9;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.5;
        }

        .card {
            margin-top: 10px;
            padding: 12px;
        }

        .small {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.55;
        }

        @media (max-width: 820px) {
            .app {
                padding: 10px;
            }

            .topbar,
            .screen {
                display: block;
            }

            .deploy-note {
                margin-top: 8px;
            }

            .cave {
                min-height: 520px;
            }

            .hud,
            .controls {
                grid-template-columns: 1fr;
            }

            .route {
                grid-template-columns: 1fr;
                inset: auto 12px 12px 12px;
            }

            .node {
                min-height: 48px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }

            .partner {
                left: 12px;
                right: 12px;
                bottom: 274px;
            }

            .speech {
                max-width: none;
                flex: 1;
            }

            .side {
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="topbar">
            <div class="title">
                <p>EXPERIMENT / docs 配下の非デプロイ試作</p>
                <h1>ヴァルモン地下探索</h1>
            </div>
            <div class="deploy-note">本番DB・報酬・ルート未接続</div>
        </div>

        <section class="screen" aria-label="ヴァルモン地下探索 試作画面">
            <div class="stage">
                <div class="cave">
                    <div class="hud">
                        <div class="meter">
                            <div class="meter-label"><span>探索進行</span><span id="progressText">0%</span></div>
                            <div class="bar"><div class="fill" id="progressBar"></div></div>
                        </div>
                        <div class="meter">
                            <div class="meter-label"><span>探索力</span><span id="energyText">6 / 6</span></div>
                            <div class="bar"><div class="fill energy" id="energyBar"></div></div>
                        </div>
                        <div class="meter">
                            <div class="meter-label"><span>危険度</span><span id="dangerText">0%</span></div>
                            <div class="bar"><div class="fill danger" id="dangerBar"></div></div>
                        </div>
                    </div>

                    <div class="partner">
                        <img id="partnerImage" src="../../public/images/valmon/valmon01.webp" alt="相棒ヴァルモン">
                        <div class="speech" id="partnerSpeech">入口の土がやわらかい。今日は浅い層なら安全に試せそう。</div>
                    </div>

                    <div class="route" id="route"></div>
                </div>

                <div class="controls">
                    <button class="btn primary" id="digButton" type="button">掘り進む</button>
                    <button class="btn warn" id="scoutButton" type="button">気配を探る</button>
                    <button class="btn" id="returnButton" type="button">帰還して精算</button>
                </div>
            </div>

            <aside class="side">
                <div class="panel-title">
                    <h2>探索設定</h2>
                </div>
                <select class="select" id="depthSelect" aria-label="探索深度">
                    <option value="shallow">浅層: はじめての地下道</option>
                    <option value="middle">中層: 光苔の空洞</option>
                    <option value="deep">深層: 古い鉱脈跡</option>
                </select>

                <div class="valmons" id="valmonList"></div>

                <div class="card">
                    <div class="panel-title">
                        <h2>持ち帰り候補</h2>
                        <span class="small" id="lootCount">0個</span>
                    </div>
                    <div class="loot-grid" id="lootGrid"></div>
                </div>

                <div class="card">
                    <div class="panel-title">
                        <h2>探索ログ</h2>
                    </div>
                    <div class="log" id="log"></div>
                </div>

                <div class="card">
                    <p class="small">
                        目的: ヴァルモンを通常探索の外でも活躍させる試作。1回の地下探索で探索力を消費し、素材候補を拾い、危険度が上がる前に帰還する判断を試す。
                    </p>
                </div>
            </aside>
        </section>
    </main>

    <script>
        const valmons = [
            { id: "leafy", name: "リーフィ", role: "探知", img: "valmon01.webp", speech: "土の匂いが変わったよ。素材の気配を追えるかも。" },
            { id: "aquaron", name: "アクアロン", role: "採集", img: "valmon02.webp", speech: "湿った壁の奥に、きれいな鉱石が眠っていそう。" },
            { id: "bolt", name: "ボルトニャ", role: "警戒", img: "valmon07.webp", speech: "奥で何か動いた。危険度は早めに見ておこう。" },
        ];

        const depthConfig = {
            shallow: {
                maxEnergy: 6,
                dangerStep: [8, 14],
                progressStep: [18, 28],
                loot: ["獣牙", "魔鉱片", "強化石の欠片", "光苔のしずく"],
            },
            middle: {
                maxEnergy: 7,
                dangerStep: [11, 18],
                progressStep: [14, 23],
                loot: ["潮風の布片", "守護石の欠片", "魔導繊維", "古びた卵殻"],
            },
            deep: {
                maxEnergy: 8,
                dangerStep: [15, 24],
                progressStep: [10, 18],
                loot: ["高純度強化石の気配", "黒鉄の装甲片", "調律石の欠片", "謎の地下印"],
            },
        };

        const state = {
            depth: "shallow",
            valmonId: "leafy",
            progress: 0,
            danger: 0,
            energy: 6,
            returned: false,
            loot: {},
            logs: [],
        };

        const $ = (id) => document.getElementById(id);
        const roll = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        function activeValmon() {
            return valmons.find((row) => row.id === state.valmonId) || valmons[0];
        }

        function config() {
            return depthConfig[state.depth];
        }

        function resetRun() {
            const cfg = config();
            state.progress = 0;
            state.danger = 0;
            state.energy = cfg.maxEnergy;
            state.returned = false;
            state.loot = {};
            state.logs = ["地下入口を確認した。相棒と一緒に探索を開始する。"];
            render();
        }

        function addLog(text) {
            state.logs.unshift(text);
            state.logs = state.logs.slice(0, 12);
        }

        function addLoot(name, quantity = 1) {
            state.loot[name] = (state.loot[name] || 0) + quantity;
        }

        function dig() {
            if (state.returned || state.energy <= 0) return;

            const cfg = config();
            const partner = activeValmon();
            state.energy -= 1;
            state.progress = Math.min(100, state.progress + roll(...cfg.progressStep));
            state.danger = Math.min(100, state.danger + roll(...cfg.dangerStep));

            const found = Math.random() < (partner.role === "採集" ? 0.78 : 0.58);
            if (found) {
                const item = cfg.loot[roll(0, cfg.loot.length - 1)];
                addLoot(item, 1);
                addLog(`${partner.name}が壁際で「${item}」を見つけた。`);
            } else {
                addLog(`${partner.name}が先導して、崩れやすい道を避けた。`);
            }

            if (state.danger >= 80 && Math.random() < 0.36) {
                state.energy = Math.max(0, state.energy - 1);
                addLog("奥から大きな揺れ。探索力を余分に消耗した。");
            }

            if (state.progress >= 100) {
                const bonus = partner.role === "探知" ? "小さな宝箱" : "地下の鉱脈メモ";
                addLoot(bonus, 1);
                state.returned = true;
                addLog(`最奥の小部屋に到達。「${bonus}」を持ち帰る。`);
            } else if (state.energy <= 0) {
                state.returned = true;
                addLog("探索力が尽きた。入口まで戻って一度休む。");
            }

            render();
        }

        function scout() {
            if (state.returned || state.energy <= 0) return;

            const partner = activeValmon();
            state.energy -= 1;
            const reduce = partner.role === "警戒" ? roll(14, 24) : roll(8, 16);
            state.danger = Math.max(0, state.danger - reduce);
            state.progress = Math.min(100, state.progress + roll(5, 10));
            addLog(`${partner.name}が耳を澄ませた。危険度を${reduce}%抑えた。`);
            render();
        }

        function finishRun() {
            state.returned = true;
            addLog("入口へ帰還。持ち帰り候補を確認した。");
            render();
        }

        function renderValmons() {
            $("valmonList").innerHTML = valmons.map((valmon) => `
                <button class="valmon-card ${state.valmonId === valmon.id ? "active" : ""}" data-valmon="${valmon.id}" type="button">
                    <img src="../../public/images/valmon/${valmon.img}" alt="${valmon.name}">
                    <strong>${valmon.name}</strong>
                    <span>${valmon.role}型</span>
                </button>
            `).join("");

            document.querySelectorAll("[data-valmon]").forEach((button) => {
                button.addEventListener("click", () => {
                    state.valmonId = button.dataset.valmon;
                    resetRun();
                });
            });
        }

        function renderPath() {
            const labels = ["入口", "地底道", "光苔", "古い坑道", "小部屋"];
            const step = Math.min(4, Math.floor(state.progress / 25));
            $("route").innerHTML = labels.map((label, index) => {
                const cls = index < step ? "done" : index === step ? "active" : "";
                return `<div class="node ${cls}"><strong>${label}</strong><span>${index < step ? "通過" : index === step ? "探索中" : "未到達"}</span></div>`;
            }).join("");
        }

        function renderLoot() {
            const entries = Object.entries(state.loot);
            $("lootCount").textContent = `${entries.reduce((sum, [, qty]) => sum + qty, 0)}個`;
            $("lootGrid").innerHTML = entries.length
                ? entries.map(([name, qty]) => `<div class="loot"><span>${name}</span><span>x${qty}</span></div>`).join("")
                : `<div class="small">まだ何も見つけていません。</div>`;
        }

        function render() {
            const cfg = config();
            const partner = activeValmon();
            $("progressText").textContent = `${state.progress}%`;
            $("energyText").textContent = `${state.energy} / ${cfg.maxEnergy}`;
            $("dangerText").textContent = `${state.danger}%`;
            $("progressBar").style.width = `${state.progress}%`;
            $("energyBar").style.width = `${Math.round((state.energy / cfg.maxEnergy) * 100)}%`;
            $("dangerBar").style.width = `${state.danger}%`;
            $("partnerImage").src = `../../public/images/valmon/${partner.img}`;
            $("partnerSpeech").textContent = state.returned
                ? "今日はここまで。持ち帰ったものを見て、次の設計を考えよう。"
                : partner.speech;
            $("digButton").disabled = state.returned || state.energy <= 0;
            $("scoutButton").disabled = state.returned || state.energy <= 0;
            $("returnButton").textContent = state.returned ? "もう一度探索" : "帰還して精算";
            $("log").innerHTML = state.logs.map((line) => `<p>${line}</p>`).join("");
            renderPath();
            renderLoot();
            renderValmons();
        }

        $("depthSelect").addEventListener("change", (event) => {
            state.depth = event.target.value;
            resetRun();
        });

        $("digButton").addEventListener("click", dig);
        $("scoutButton").addEventListener("click", scout);
        $("returnButton").addEventListener("click", () => {
            if (state.returned) {
                resetRun();
            } else {
                finishRun();
            }
        });

        resetRun();
    </script>
</body>
</html>
